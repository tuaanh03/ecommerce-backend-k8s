name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Git tag
        id: vars
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:${{ env.TAG_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest
            
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: tuaanh03/ecommerce-infrastructure
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: ecommerce-infrastructure

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update backend image in manifest
        run: |
          cd ecommerce-infrastructure

          yq -i '
            select(.kind == "Deployment" and .metadata.name == "ecommerce-backend-deployment")
            .spec.template.spec.containers[0].image = "${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:${{ env.TAG_NAME }}"
          ' apps/ecommerce/stack.yaml

      - name: Commit and push manifest
        run: |
          cd ecommerce-infrastructure
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/ecommerce/stack.yaml
          git commit -m "Update backend image to ${{ env.TAG_NAME }}" || echo "No changes to commit"
          git push